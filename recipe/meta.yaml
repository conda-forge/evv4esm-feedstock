{% set name = "evv4esm" %}
{% set version = "0.6.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ca5e0ea91ae3c5e4fe63ea1f4220878f13fe324ec911d0046683d64ea947dbaf

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - evv = evv4esm.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - six
    - numpy
    - scipy
    - pandas
    - livvkit >=3.3.1
    - netcdf4
    - matplotlib-base
    - pybtex
    - statsmodels >=0.14.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - evv4esm
  commands:
    - evv --version

about:
  home: https://github.com/LIVVkit/evv4esm
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Extended verification and validation of Earth system models

  # The remaining entries in this section are optional, but recommended.
  description: |
    EVV is a python-based toolkit for extended verification and validation of
    Earth system models (ESMs). Currently, it provides a number tests to
    determine if modifications to an ESM is climate changing.
  doc_url: https://github.com/LIVVkit/evv4esm
  dev_url: https://github.com/LIVVkit/evv4esm

extra:
  recipe-maintainers:
    - jhkennedy
    - mkstratos
